name: Bug report
description: Report a reproducible problem with the MCP server or report output.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove credentials, private URLs, and sensitive report data before submitting.
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 22.0.0
    validations:
      required: true
  - type: input
    id: chrome-version
    attributes:
      label: Chrome or Chromium version
      placeholder: Google Chrome 149
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: input
    id: mcp-client
    attributes:
      label: MCP client
      placeholder: Claude Desktop, Codex, Cursor, or another client
    validations:
      required: true
  - type: dropdown
    id: audit-mode
    attributes:
      label: Audit mode
      options:
        - fast
        - reliable
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the sanitized tool input and the smallest sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: stderr
    attributes:
      label: Sanitized stderr output
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private URLs, credentials, tokens, cookies, and sensitive report data.
          required: true
