name: Feature request
description: Propose a focused improvement to the audit or coding-agent workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow problem rather than only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Proposed workflow
      description: Explain how a developer or coding agent would use the improvement.
    validations:
      required: true
  - type: input
    id: affected-surface
    attributes:
      label: Affected MCP client or Lighthouse audit
      placeholder: Codex, Claude Desktop, unused-javascript, report schema
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: dropdown
    id: contribution
    attributes:
      label: Would you contribute this change?
      options:
        - "Yes"
        - "No"
        - "Maybe, with guidance"
    validations:
      required: true
